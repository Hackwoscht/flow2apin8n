version: '3.8'

services:
  flow2api-headed:
    build:
      context: .
      dockerfile: Dockerfile.headed
    image: flow2api:headed
    container_name: flow2api-headed
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - XVFB_WHD=1920x1080x24
      - CHROMIUM_FLAGS=--disable-gpu --no-sandbox --disable-dev-shm-usage
    shm_size: "2gb"
    mem_limit: 4g
    memswap_limit: 4g
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/", "-o", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
